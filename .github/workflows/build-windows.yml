# GitHub Actions：在 Windows 虚拟机上把项目打包成 .exe
#
# 测试构建（出 artifact，不发 Release）：推 main，或网页 Actions 手动触发
# 正式发布（出 artifact + 发 Release）：验收通过后才打 tag
#   git tag v0.1.0 && git push origin v0.1.0

name: build-windows

on:
  push:
    branches: [main]      # 推 main：构建测试产物 artifact（不发 Release）
    tags: ["v*"]          # 打 tag：构建 + 发布 Release（里程碑才打 tag）
  workflow_dispatch: {}    # 网页手动触发（也只出 artifact）

permissions:
  contents: write          # 发布 Release 需要写权限

jobs:
  # 在云端真 Windows 上自动测试：逻辑 + 真实记事本插入（自动抓"粘两遍/插入慢"）
  test:
    runs-on: windows-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
      - name: 装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 装测试依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pynput pyperclip pytest pytest-timeout pywinauto
      - name: 跑测试（逻辑 + GUI 插入）
        run: pytest tests/ -v --timeout=120

  build-windows:
    runs-on: windows-latest    # ← GitHub 免费提供的 Windows 虚拟机
    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 装依赖 + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 打包成单文件 exe
        # --collect-all 确保 sherpa-onnx / sounddevice 的原生库被一起打包
        run: >
          pyinstaller --onefile --name voice-input
          --collect-all sherpa_onnx
          --collect-all sounddevice
          src/main.py

      - name: 上传构建产物（每次构建都能下载）
        uses: actions/upload-artifact@v4
        with:
          name: voice-input-windows
          path: dist/voice-input.exe

      - name: 发布到 Release（仅打 tag 时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/voice-input.exe
