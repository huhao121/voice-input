# GitHub Actions：在 Windows 虚拟机上把项目打包成 .exe 并发布到 Release
#
# 【怎么触发】打一个版本 tag 就会自动构建并发布：
#   git tag v0.1.0 && git push origin v0.1.0
#   （也可以在 GitHub 网页 Actions 页点按钮手动触发）

name: build-windows

on:
  push:
    tags: ["v*"]          # 推送 v 开头的 tag 时触发（如 v0.1.0）
  workflow_dispatch: {}    # 也允许在网页上手动点触发

permissions:
  contents: write          # 发布 Release 需要写权限

jobs:
  build-windows:
    runs-on: windows-latest    # ← GitHub 免费提供的 Windows 虚拟机
    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 装依赖 + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 打包成单文件 exe
        # --collect-all 确保 sherpa-onnx / sounddevice 的原生库被一起打包
        run: >
          pyinstaller --onefile --name voice-input
          --collect-all sherpa_onnx
          --collect-all sounddevice
          src/main.py

      - name: 上传构建产物（每次构建都能下载）
        uses: actions/upload-artifact@v4
        with:
          name: voice-input-windows
          path: dist/voice-input.exe

      - name: 发布到 Release（仅打 tag 时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/voice-input.exe
